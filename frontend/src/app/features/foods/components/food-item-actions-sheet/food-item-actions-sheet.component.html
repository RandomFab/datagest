<div class="sheet">
  <div class="sheet-handle"></div>

  <!-- Item preview -->
  <div class="item-preview">
    <div class="preview-icon" [class]="'preview-icon--' + (item().is_drink ? 'drink' : 'food')">
      @if (!item().is_drink) {
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/>
          <path d="M2 22 17 7"/>
        </svg>
      } @else {
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 3h14l-1.4 15.1a2 2 0 0 1-2 1.9H8.4a2 2 0 0 1-2-1.9Z"/>
          <path d="M6 9h12"/>
        </svg>
      }
    </div>
    <div class="preview-info">
      <div class="preview-name">{{ item().name }}</div>
      <div class="preview-meta">
        {{ item().category }}
        @if (item().sub_category) { · {{ item().sub_category }} }
        @if (item().allergens.length > 0) { · {{ item().allergens.length }} allergen{{ item().allergens.length > 1 ? 's' : '' }} }
      </div>
    </div>
  </div>

  <!-- Actions -->
  <div class="sheet-actions">
    <button class="action-btn action-btn--edit" (click)="edit.emit()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
      </svg>
      Edit item
    </button>

    <button class="action-btn action-btn--delete" (click)="delete.emit()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
        <path d="M10 11v6M14 11v6"/>
        <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
      </svg>
      Delete item
    </button>
  </div>

  <button class="cancel-btn" (click)="closed.emit()">Cancel</button>
</div>
