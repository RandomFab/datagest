<div class="sheet">
  <div class="sheet-handle"></div>

  <div class="sheet-header">
    <span class="sheet-title">{{ isEditing() ? 'Edit' : 'Add' }} {{ isDrink() ? 'drink' : 'food' }}</span>
    <button class="sheet-close" (click)="closed.emit()" aria-label="Close">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#5f7070" stroke-width="2.4" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <div class="form-body">
    <!-- Name -->
    <div class="field">
      <label class="field-label">Name <span class="field-required">*</span></label>
      <input
        class="field-input"
        type="text"
        placeholder="e.g. Broccoli, Green tea…"
        [value]="name()"
        (input)="name.set($any($event.target).value)"
        autofocus
      />
    </div>

    <!-- Category -->
    <div class="field">
      <label class="field-label">Category</label>
      <div class="category-grid">
        @for (cat of categories; track cat) {
          <button
            class="category-btn"
            [class.active]="category() === cat"
            (click)="category.set(cat)"
          >
            {{ cat }}
          </button>
        }
      </div>
    </div>

    <!-- Sub-category -->
    <div class="field">
      <label class="field-label">Sub-category <span class="field-opt">· optional</span></label>
      <input
        class="field-input"
        type="text"
        placeholder="e.g. Cruciferous, Herbal…"
        [value]="subCategory()"
        (input)="subCategory.set($any($event.target).value)"
      />
    </div>

    <!-- Allergens -->
    @if (allergens().length > 0) {
      <div class="field">
        <label class="field-label">Allergens <span class="field-opt">· optional</span></label>
        <div class="allergen-grid">
          @for (allergen of allergens(); track allergen.id) {
            <button
              class="allergen-chip"
              [class.active]="selectedAllergenIds().has(allergen.id)"
              (click)="toggleAllergen(allergen.id)"
            >
              {{ allergen.name }}
            </button>
          }
        </div>
      </div>
    }

    @if (error()) {
      <p class="form-error">{{ error() }}</p>
    }
  </div>

  <div class="sheet-cta">
    <button class="cta-btn" [disabled]="!canSubmit()" (click)="submit()">
      @if (submitting()) {
        Saving…
      } @else {
        {{ isEditing() ? 'Save changes' : 'Add to catalog' }}
      }
    </button>
  </div>
</div>
