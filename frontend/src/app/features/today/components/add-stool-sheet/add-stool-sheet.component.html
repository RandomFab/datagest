<div class="sheet">
  <div class="sheet-handle"></div>

  <div class="sheet-header">
    <div class="sheet-header-left">
      <div class="stool-icon">
        <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="#b45309" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 8c2-2 4-2 6 0s4 2 6 0 4-2 6 0"/>
          <path d="M2 13c2-2 4-2 6 0s4 2 6 0 4-2 6 0"/>
        </svg>
      </div>
      <div>
        <div class="sheet-title">Bowel movement</div>
        <div class="sheet-subtitle">Pick the closest type · Bristol scale</div>
      </div>
    </div>
    <button class="sheet-close" (click)="closed.emit()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#5f7070" stroke-width="2.4" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <!-- Gradient legend -->
  <div class="gradient-legend">
    <span>← Constipated</span>
    <span class="ideal">Ideal</span>
    <span>Diarrhea →</span>
  </div>
  <div class="gradient-bar"></div>

  <!-- Bristol type list -->
  <div class="bristol-list">
    @for (bt of bristolTypes; track bt.type) {
      <button
        class="bristol-row"
        [class.selected]="selectedType() === bt.type"
        (click)="select(bt.type)"
      >
        <div class="bristol-visual" [class]="'bristol-visual--' + bt.type"></div>
        <div class="bristol-info">
          <span class="bristol-label">{{ bt.label }}</span>
          <span class="bristol-desc">{{ bt.desc }}</span>
        </div>
        @if (selectedType() === bt.type) {
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0d9488" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        }
      </button>
    }
  </div>

  <div class="time-row">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--color-muted)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
    </svg>
    <input class="time-input" type="time" [value]="entryTime()" (change)="entryTime.set($any($event.target).value)" />
  </div>

  <div class="sheet-cta">
    <button class="cta-btn" [disabled]="selectedType() === null" (click)="confirm()">
      {{ isEditing ? 'Save changes' : 'Add to Today' }}
    </button>
  </div>
</div>
