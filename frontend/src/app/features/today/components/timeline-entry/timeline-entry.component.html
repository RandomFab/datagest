<div class="entry-row">
  <span class="entry-time">{{ entry().time }}</span>

  <button class="entry-card" [class]="'entry-card--' + entry().type" (click)="tapped.emit(entry())" aria-label="Options for {{ entry().name }}">
    <div class="entry-icon" [class]="'entry-icon--' + entry().type">
      @switch (entry().type) {
        @case ('food') {
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/>
            <path d="M2 22 17 7"/>
          </svg>
        }
        @case ('drink') {
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 3h14l-1.4 15.1a2 2 0 0 1-2 1.9H8.4a2 2 0 0 1-2-1.9Z"/>
            <path d="M6 9h12"/>
          </svg>
        }
        @case ('stool') {
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 8c2-2 4-2 6 0s4 2 6 0 4-2 6 0"/>
            <path d="M2 13c2-2 4-2 6 0s4 2 6 0 4-2 6 0"/>
          </svg>
        }
        @case ('symptom') {
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
          </svg>
        }
      }
    </div>

    <div class="entry-content">
      <div class="entry-name">{{ entry().name }}</div>
      <div class="entry-detail">{{ entry().detail }}</div>
    </div>

    @if (entry().quality === 'ideal') {
      <span class="quality-badge quality-badge--ideal">Ideal</span>
    }
    @if (entry().quality === 'concerning') {
      <span class="quality-badge quality-badge--concerning">Check</span>
    }
  </button>
</div>
