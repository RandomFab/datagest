<div class="sheet">
  <div class="sheet-handle"></div>

  <div class="sheet-header">
    <div class="sheet-header-left">
      <div class="symptom-icon">
        <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="#c2410c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
        </svg>
      </div>
      <div class="sheet-title">Log a symptom</div>
    </div>
    <button class="sheet-close" (click)="closed.emit()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#5f7070" stroke-width="2.4" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <div class="sheet-body">
    <div class="section">
      <label class="section-label">Symptom</label>
      <div class="preset-grid">
        @for (p of presets; track p) {
          <button
            class="preset-btn"
            [class.active]="selectedPreset() === p"
            (click)="selectPreset(p)"
          >{{ p }}</button>
        }
      </div>
      <input
        class="custom-input"
        type="text"
        placeholder="Or type a custom symptom…"
        [value]="customName()"
        (input)="onCustomInput($any($event.target).value)"
      />
    </div>

    <div class="section">
      <label class="section-label">
        Intensity
        <span class="intensity-value">{{ intensity() }} / 10 · <em>{{ intensityLabel() }}</em></span>
      </label>
      <input
        class="slider"
        type="range"
        min="1"
        max="10"
        [value]="intensity()"
        (input)="onIntensityChange($any($event.target).value)"
      />
      <div class="slider-legend">
        <span>Mild</span>
        <span>Moderate</span>
        <span>Severe</span>
      </div>
    </div>
  </div>

  <div class="time-row">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--color-muted)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
    </svg>
    <input class="time-input" type="time" [value]="entryTime()" (change)="entryTime.set($any($event.target).value)" />
  </div>

  <div class="sheet-cta">
    <button class="cta-btn" [disabled]="!symptomName().trim()" (click)="confirm()">
      {{ isEditing ? 'Save changes' : 'Add to Today' }}
    </button>
  </div>
</div>
